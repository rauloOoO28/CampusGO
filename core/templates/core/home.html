{% extends 'core/base.html' %}

{% block content %}
<div class="space-y-8 animate-in fade-in duration-700">
    
    <div>
        <h2 class="text-3xl font-extrabold text-slate-800 leading-tight">¿A dónde quieres<br><span class="text-blue-600">llegar hoy?</span></h2>
    </div>

    <div class="relative group">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
            <span class="text-slate-400 group-focus-within:text-blue-500 transition-colors">🔍</span>
        </div>
        <input type="text" 
               class="w-full bg-slate-100 border-none p-5 pl-12 rounded-2xl focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all outline-none text-slate-700 placeholder:text-slate-400 shadow-inner"
               placeholder="Busca tu escuela o facultad...">
    </div>

    <button class="w-full relative overflow-hidden group bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-3xl shadow-xl shadow-blue-200 transition-all hover:scale-[1.02] active:scale-95">
        <div class="absolute -right-4 -top-4 w-24 h-24 bg-white/10 rounded-full blur-2xl"></div>
        
        <div class="relative z-10 flex flex-col items-center text-white">
            <div class="bg-white/20 p-4 rounded-2xl mb-4 backdrop-blur-sm">
                <span class="text-4xl">📸</span>
            </div>
            <h3 class="text-xl font-bold">Escanear Código QR</h3>
            <p class="text-blue-100 text-xs mt-2 font-medium opacity-80 uppercase tracking-widest">Ubícate al instante</p>
        </div>
    </button>

    <div class="pt-4">
        <div class="flex justify-between items-center mb-4">
            <h4 class="font-bold text-slate-800">Recientes</h4>
            <button class="text-blue-600 text-xs font-bold uppercase tracking-wider">Limpiar</button>
        </div>
        
        <div class="space-y-3">
            <div class="flex items-center p-4 bg-white border border-slate-100 rounded-2xl shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-2xl mr-4">🏫</div>
                <div class="flex-grow">
                    <p class="font-bold text-slate-700">ESCOM - IPN</p>
                    <p class="text-[11px] text-slate-400 font-medium">Ciudad de México</p>
                </div>
                <span class="text-slate-300">❯</span>
            </div>

            <div class="flex items-center p-4 bg-white border border-slate-100 rounded-2xl shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-2xl mr-4">🏛️</div>
                <div class="flex-grow">
                    <p class="font-bold text-slate-700">ENCB - IPN</p>
                    <p class="text-[11px] text-slate-400 font-medium">Unidad Zacatenco</p>
                </div>
                <span class="text-slate-300">❯</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
