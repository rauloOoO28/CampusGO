<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusGO | Tu Guía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-2xl shadow-blue-100/50">
        
        <header class="p-6 flex justify-between items-center bg-white/80 sticky top-0 z-50 border-b border-slate-100">
            <span class="text-2xl font-black text-blue-600 tracking-tighter">CampusGO</span>
            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-xl">👤</div>
        </header>

        <main class="flex-grow p-6">
            {% block content %}
            {% endblock %}
        </main>

        <nav class="sticky bottom-0 bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-4 pb-8">
            <button class="flex flex-col items-center text-blue-600">
                <span class="text-xl">🏠</span>
                <span class="text-[10px] font-bold uppercase mt-1">Inicio</span>
            </button>
            <button class="flex flex-col items-center text-slate-400">
                <span class="text-xl">📍</span>
                <span class="text-[10px] font-bold uppercase mt-1">Mapa</span>
            </button>
            <button class="flex flex-col items-center text-slate-400">
                <span class="text-xl">⚙️</span>
                <span class="text-[10px] font-bold uppercase mt-1">Ajustes</span>
            </button>
        </nav>
    </div>
</body>
</html>
